<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music Clone - Cosmic Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside class="sidebar">
        <!-- === ОНОВЛЕНИЙ НОВИЙ ЛОГОТИП З ТЕКСТОМ === -->
        <div class="logo-container">
            <img src="assets/pngtree-music-logo-png-image_6389182.png" alt="Musical Sound Logo" class="logo-img">
            <span class="logo-text">musical sound</span>
        </div>
        
        <nav>
            <a href="#" class="nav-item active">
                <img src="assets/home.png" class="nav-icon red-tint" alt="Головна">
                Головна
            </a>
            <a href="#" class="nav-item">
                <img src="assets/explore.png" class="nav-icon teal-tint" alt="Огляд">
                Огляд
            </a>
            <a href="#" class="nav-item">
                <img src="assets/library.png" class="nav-icon gold-tint" alt="Бібліотека">
                Бібліотека
            </a>
        </nav>

        <div class="divider"></div>
        <button class="btn-new-playlist"><span>+</span> Новий плейліст</button>

        <div class="playlist-section"></div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Шукайте свою музику...">
            </div>
            <a href="register.html" class="user-profile-glow" style="text-decoration: none; cursor: pointer;">
                <div class="avatar-circle">
                    <img src="assets/avatar.png" alt="Profile">
                </div>
            </a>
        </header>

        <div class="mood-pills">
            <button class="pill active">Гарний настрій</button>
            <button class="pill">Релакс</button>
            <button class="pill">Енергія</button>
            <button class="pill">У дорозі</button>
            <button class="pill">Сум</button>
            <button class="pill">Романтика</button>
            <button class="pill">Тренування</button>
            <button class="pill">Вечірка</button>
            <button class="pill">Фокус</button>
            <button class="pill">Сон</button>
        </div>

        <!-- 1 БЛОК: Слухати знову -->
        <section class="content-section">
            <div class="section-header">
                <div class="user-info-row">
                    <div class="title-text">
                        <span class="username">LILY DN</span>
                        <h2 class="glow-text">Слухати знову</h2>
                    </div>
                </div>
            </div>
            <div class="music-grid"></div>
        </section>

        <!-- 2 БЛОК: Рекомендовано -->
        <section class="content-section" style="margin-top: 40px;">
            <div class="section-header">
                <div class="user-info-row">
                    <div class="title-text">
                        <span class="username">Рекомендовано</span>
                        <h2 class="glow-text">Тобі сподобається</h2>
                    </div>
                </div>
            </div>
            <div class="music-grid" id="recommendedGrid"></div>
        </section>

        <!-- 3 БЛОК: Нові релізи -->
        <section class="content-section" style="margin-top: 40px;">
            <div class="section-header">
                <div class="user-info-row">
                    <div class="title-text">
                        <span class="username">Новинки</span>
                        <h2 class="glow-text">Нові релізи</h2>
                    </div>
                </div>
            </div>
            <div class="music-grid" id="newReleasesGrid"></div>
        </section>

        <!-- 4 БЛОК: Свіжі чарти -->
        <section class="content-section" style="margin-top: 40px;">
            <div class="section-header">
                <div class="user-info-row">
                    <div class="title-text">
                        <span class="username">Популярне</span>
                        <h2 class="glow-text">Свіжі чарти</h2>
                    </div>
                </div>
            </div>
            <div class="music-grid" id="chartsGrid"></div>
        </section>
    </main>

    <footer class="player-bar">
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="player-controls">
            <button class="player-btn">⏮</button>
            <button id="mainPlayBtn" class="player-btn play-pause">
                <img src="assets/play.png" id="playBtnImg" alt="Play">
            </button>
            <button class="player-btn">⏭</button>
            
            <button id="repeatBtn" class="player-btn repeat-control" title="Повторювати трек">
                <img src="assets/backup.png" id="repeatBtnImg" alt="Repeat">
            </button>
        </div>

        <div class="player-info">
            <img src="assets/cover1.jpg" class="current-track-img" id="currentTrackImg">
            <div class="track-meta">
                <div class="track-title" id="currentTrackTitle">Програвач порожній</div>
                <div class="track-artist" id="currentTrackArtist">Оберіть трек</div>
            </div>
        </div>

        <div class="volume-controls">
            <img src="assets/audio-speaker1.png" class="volume-icon" alt="Volume">
            <input type="range" class="volume-slider" min="0" max="100" value="80">
        </div>
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
